<!DOCTYPE html>
<html>
<head>
<title>Assign Students</title>

<style>
body {
    font-family: Arial;
    background: #0b1a33;
    color: white;
    text-align: center;
}

.container {
    background: white;
    color: black;
    width: 400px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* 🔵 Default button */
button {
    padding: 10px 20px;
    background: #0b1a33;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    margin: 5px;
}

/* 🟢 Dashboard button */
.dashboard-btn {
    background: #28a745;
}

.dashboard-btn:hover {
    background: #218838;
}
</style>

</head>

<body>

<h2>Assign Student to Mentor</h2>

<div class="container">

<input type="text" id="name" placeholder="Student Name"><br>
<input type="text" id="roll" placeholder="Roll No"><br>
<input type="text" id="division" placeholder="Division"><br>
<input type="text" id="mentor" placeholder="Mentor Name"><br>

<button onclick="assignStudent()">Assign</button>

<!-- 🟢 Go to Dashboard Button -->
<button class="dashboard-btn" onclick="goToDashboard()">
    Go to Dashboard
</button>

</div>

<script>

function assignStudent() {

    let data = {
        studentName: document.getElementById("name").value,
        roll: document.getElementById("roll").value,
        division: document.getElementById("division").value,
        mentorName: document.getElementById("mentor").value
    };

    if (!data.studentName || !data.roll || !data.division || !data.mentorName) {
        alert("Please fill all fields");
        return;
    }

    let assigned = JSON.parse(localStorage.getItem("assignedStudents")) || [];
    assigned.push(data);

    localStorage.setItem("assignedStudents", JSON.stringify(assigned));

    alert("Student assigned successfully!");

    document.querySelectorAll("input").forEach(e => e.value = "");
}

// 🚪 Redirect to dashboard
function goToDashboard() {
    window.location.href = "mentordashboard.html"; 
}

</script>

</body>
</html>
