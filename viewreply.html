<!DOCTYPE html>
<html>
<head>
<title>View Reply</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #0b1a33, #162a52);
    color: white;
    text-align: center;
}

h2 {
    margin-top: 20px;
}

table {
    width: 80%;
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
    color: black;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #0b1a33;
    color: white;
    padding: 12px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}
.dashboard-btn {
    margin-top: 15px;
    padding: 10px 18px;
    background: #28a745;   /* green */
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

.dashboard-btn:hover {
    background: #218838;   /* darker green */
}
</style>
</head>

<body>

<h2>View Replies</h2>

<table id="table">
<tr>
<th>Name</th>
<th>Roll</th>
<th>Answer</th>
</tr>
</table>



<button class="dashboard-btn" onclick="goDashBoard()">
    Go to Dashboard
</button>
<script>
let data = JSON.parse(localStorage.getItem("doubts")) || [];
let table = document.getElementById("table");

let found = false;

data.forEach(d => {
    if (d.answer && d.answer.trim() !== "") {
        found = true;
        let row = table.insertRow();
        row.insertCell(0).innerText = d.name;
        row.insertCell(1).innerText = d.roll;
        row.insertCell(2).innerText = d.answer;
    }
});

if (!found) {
    let row = table.insertRow();
    row.insertCell(0).colSpan = 3;
    row.cells[0].innerText = "No replies yet";
}

function goDashBoard() {
    window.location.href = "studentdashboard.html";
}

</script>

</body>
</html>
