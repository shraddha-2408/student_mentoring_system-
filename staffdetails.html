<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0b1a33;
    color: white;
    text-align: center;
}

.header {
    font-size: 28px;
    padding: 30px;
}

.card {
    background: #dcdcdc;
    color: black;
    width: 350px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 12px;
    text-align: left;
}

.card p {
    margin: 8px 0;
}

button {
    padding: 12px 25px;
    margin-top: 30px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header" id="headerText">Staff Members</div>

<div id="staffContainer"></div>

<button onclick="goToDashboard()">Go to Dashboard</button>

<script>

window.onload = function () {

    let staffList = JSON.parse(localStorage.getItem("staff")) || [];
    let container = document.getElementById("staffContainer");

    if (staffList.length === 0) {
        container.innerHTML = "<p>No staff available</p>";
        return;
    }

    staffList.forEach(staff => {
        container.innerHTML += `
            <div class="card">
                <p><b>Name:</b> ${staff.name}</p>
                <p><b>Email:</b> ${staff.email}</p>
                <p><b>Mobile:</b> ${staff.mobile}</p>
                <p><b>Department:</b> ${staff.dept}</p>
            </div>
        `;
    });
};

function goToDashboard() {
    window.location.href = "staffdashboard.html";
}

</script>

</body>
</html>
