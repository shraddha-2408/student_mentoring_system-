<!DOCTYPE html>
<html>
<head>
<title>Upcoming Meetings</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}

.container {
    width: 600px;
    margin: 50px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 10px;
    border: 1px solid #ccc;
}

th {
    background: #0b1a33;
    color: white;
}

button {
    padding: 10px 20px;
    margin-top: 15px;
    background: #28a745;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>Upcoming Meetings</h2>

    <table id="table">
        <tr>
            <th>Mentor</th>
            <th>Batch</th>
            <th>Date</th>
            <th>Time</th>
            <th>Link</th>
        </tr>
    </table>

    <button onclick="goToDashboard()">Go to Dashboard</button>
</div>

<script>

let meetings = JSON.parse(localStorage.getItem("meetingData")) || [];
let table = document.getElementById("table");

if (meetings.length === 0) {
    let row = table.insertRow();
    row.insertCell(0).colSpan = 5;
    row.cells[0].innerText = "No upcoming meetings";
} else {
    meetings.forEach(m => {
        let row = table.insertRow();

        row.insertCell(0).innerText = m.mentor;
        row.insertCell(1).innerText = m.batch;
        row.insertCell(2).innerText = m.date;
        row.insertCell(3).innerText = m.time;

        let linkCell = row.insertCell(4);
        let a = document.createElement("a");
        a.href = m.link;
        a.innerText = "Join";
        a.target = "_blank";

        linkCell.appendChild(a);
    });
}

function goToDashboard() {
    window.location.href = "studentdashboard.html";
}

</script>

</body>
</html>
